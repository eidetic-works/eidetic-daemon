# gradle.properties — IntelliJ Platform / plugin coordinates.
#
# Target platform 2024.1 (build 241) so the plugin loads on current IntelliJ,
# PyCharm, GoLand, WebStorm, Rider, etc. Update sinceBuild when raising the
# floor and untilBuild ("") tracks open-ended so JetBrains' compatibility
# checker is happy.

# JVM
org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true

# Kotlin
kotlin.code.style=official
kotlin.stdlib.default.dependency=false

# Plugin coordinates (consumed by build.gradle.kts)
pluginGroup=works.eidetic.jetbrains
pluginName=eidetic-jetbrains
pluginVersion=0.0.1

# IntelliJ Platform version we build against
platformType=IC
platformVersion=2024.1
# Compatibility window — 241 = 2024.1, leave untilBuild empty so the JetBrains
# updater doesn't refuse newer platform releases.
pluginSinceBuild=241
pluginUntilBuild=
