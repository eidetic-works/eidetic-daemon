name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build all targets
        run: make build-all

      - name: Tarball each target
        run: |
          mkdir -p release
          for target in darwin-arm64 linux-amd64 linux-arm64; do
            # Stage binary + completions in a per-target dir so the tarball
            # has predictable layout: eideticd + completions/ at the top level.
            staging=$(mktemp -d)
            cp dist/eideticd-${target} "$staging/eideticd"
            if [ -d completions ]; then
              cp -r completions "$staging/completions"
            fi
            ( cd "$staging" && tar -czf "$GITHUB_WORKSPACE/release/eideticd-${target}.tar.gz" eideticd $([ -d completions ] && echo completions) )
            rm -rf "$staging"
          done
          # Windows ships as a zipped exe rather than tarball — no completions
          # path on Windows yet (PowerShell completions are a future ship).
          ( cd dist && zip -j ../release/eideticd-windows-amd64.zip eideticd-windows-amd64.exe )
          ls -la release/

      - name: Smoke-test release artifacts
        run: |
          # Extract + -version each tarball to catch silent build failures
          # and the tarball-shape regression that broke install.sh in v0.0.27.
          for target in darwin-arm64 linux-amd64 linux-arm64; do
            tmp=$(mktemp -d)
            tar -xzf release/eideticd-${target}.tar.gz -C "$tmp"
            if [ "$target" = "darwin-arm64" ]; then
              echo "PASS [${target}]: $(\"$tmp/eideticd\" -version)"
            else
              echo "PASS [${target}]: skipping -version (cross-arch); file check below"
              file "$tmp/eideticd"
            fi
            rm -rf "$tmp"
          done

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/eideticd-darwin-arm64.tar.gz
            release/eideticd-linux-amd64.tar.gz
            release/eideticd-linux-arm64.tar.gz
            release/eideticd-windows-amd64.zip
          generate_release_notes: true

      - name: Compute SHA256s for Homebrew formula
        id: shas
        run: |
          DARWIN_ARM64=$(shasum -a 256 release/eideticd-darwin-arm64.tar.gz | awk '{print $1}')
          LINUX_AMD64=$(shasum -a 256 release/eideticd-linux-amd64.tar.gz   | awk '{print $1}')
          LINUX_ARM64=$(shasum -a 256 release/eideticd-linux-arm64.tar.gz   | awk '{print $1}')
          echo "darwin_arm64=${DARWIN_ARM64}" >> $GITHUB_OUTPUT
          echo "linux_amd64=${LINUX_AMD64}" >> $GITHUB_OUTPUT
          echo "linux_arm64=${LINUX_ARM64}" >> $GITHUB_OUTPUT
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Update Homebrew formula in tap
        if: env.HOMEBREW_TAP_PAT != ''
        env:
          HOMEBREW_TAP_PAT: ${{ secrets.HOMEBREW_TAP_PAT }}
        run: |
          set -euo pipefail
          TAP_DIR=$(mktemp -d)
          git clone "https://x-access-token:${HOMEBREW_TAP_PAT}@github.com/eidetic-works/homebrew-nucleus.git" "$TAP_DIR"
          cd "$TAP_DIR"

          # Semver guard: never downgrade. Tag pushes are sometimes out-of-order
          # (hotfix re-tag, forgotten fold-back) — if the tap is already at a
          # higher version, skip rather than regress users.
          NEW_VER="${{ steps.shas.outputs.version }}"
          CUR_VER=$(grep -E '^\s*version\s+' Formula/eideticd.rb | head -1 | sed -E 's/.*"([^"]+)".*/\1/' || true)
          if [ -n "$CUR_VER" ]; then
            # Compare via sort -V (-V handles semver lexically)
            HIGHER=$(printf '%s\n%s\n' "$CUR_VER" "$NEW_VER" | sort -V | tail -1)
            if [ "$HIGHER" != "$NEW_VER" ] || [ "$CUR_VER" = "$NEW_VER" ]; then
              echo "::warning::Tap already at $CUR_VER ≥ pushing tag $NEW_VER — skip (no downgrade)."
              exit 0
            fi
          fi

          # Regenerate Formula/eideticd.rb with new version + SHAs.
          # Preserves the def install + def caveats blocks via marker-aware render.
          cat > Formula/eideticd.rb <<RUBY
          class Eideticd < Formula
            desc "Always-on memory daemon for AI workflows — captures Claude Code, Cursor, and Cowork sessions to local SQLite"
            homepage "https://eidetic.works"
            version "${{ steps.shas.outputs.version }}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/eidetic-works/eidetic-daemon/releases/download/${{ steps.shas.outputs.tag }}/eideticd-darwin-arm64.tar.gz"
                sha256 "${{ steps.shas.outputs.darwin_arm64 }}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/eidetic-works/eidetic-daemon/releases/download/${{ steps.shas.outputs.tag }}/eideticd-linux-amd64.tar.gz"
                sha256 "${{ steps.shas.outputs.linux_amd64 }}"
              end
              on_arm do
                url "https://github.com/eidetic-works/eidetic-daemon/releases/download/${{ steps.shas.outputs.tag }}/eideticd-linux-arm64.tar.gz"
                sha256 "${{ steps.shas.outputs.linux_arm64 }}"
              end
            end

            def install
              bin.install "eideticd"
              # Shell completions (v0.0.48+)
              if File.exist?("completions/eideticd.bash")
                bash_completion.install "completions/eideticd.bash" => "eideticd"
              end
              if File.exist?("completions/_eideticd")
                zsh_completion.install "completions/_eideticd"
              end
            end

            def caveats
              <<~EOS
                Register eideticd as a login-time service (launchd / systemd-user):
                  eideticd -install

                Check it's running:
                  curl --unix-socket /tmp/eidetic-daemon.sock http://localhost/healthz

                Show your engram stats:
                  eideticd -stats

                Validate cloud sync (Pro):
                  eideticd --check

                MCP bridge for Claude Code / Cursor:
                  pip install eidetic-mcp
                  claude mcp add eidetic -- python -m eidetic_mcp.server

                Browse engrams in the browser:
                  eideticd -bridge :8421
                  open https://eidetic.works/dashboard
              EOS
            end

            test do
              system "#{bin}/eideticd", "-version"
            end
          end
          RUBY

          git config user.name  "eidetic-works-bot"
          git config user.email "bot@eidetic.works"
          git add Formula/eideticd.rb
          if git diff --cached --quiet; then
            echo "formula already up to date"
            exit 0
          fi
          git commit -m "eideticd ${{ steps.shas.outputs.tag }} (auto from release workflow)"
          git push origin main

      - name: Tap update skipped (no PAT)
        if: env.HOMEBREW_TAP_PAT == ''
        env:
          HOMEBREW_TAP_PAT: ${{ secrets.HOMEBREW_TAP_PAT }}
        run: |
          echo "::warning::HOMEBREW_TAP_PAT secret not set — Homebrew tap NOT updated."
          echo "::warning::To enable auto-tap-update: create a PAT with repo scope on eidetic-works/homebrew-nucleus,"
          echo "::warning::then add it as the HOMEBREW_TAP_PAT secret in eidetic-works/eidetic-daemon settings."

  # ─────────────────────────────────────────────────────────────────────────
  # Marketplace fan-out — each job no-ops cleanly if its publisher token
  # isn't set yet, then activates the moment Lokesh adds the secret.
  # See docs/DISTRIBUTION_AUTOPILOT.md for the one-time setup walkthrough.
  # All 5 jobs run in parallel after `release` finishes successfully.
  # ─────────────────────────────────────────────────────────────────────────

  publish-vscode:
    needs: release
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-rc') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check publisher token
        id: token_check
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::warning::VSCE_PAT not set — skipping VS Code Marketplace publish."
            echo "::warning::Setup: claim 'eidetic-works' publisher at marketplace.visualstudio.com/manage,"
            echo "::warning::generate PAT (scope: Marketplace > Manage) at dev.azure.com,"
            echo "::warning::add as VSCE_PAT secret."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - name: Build + publish .vsix
        if: steps.token_check.outputs.skip != 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          cd integrations/vscode
          npm ci
          npm run package
          npx @vscode/vsce publish --no-yarn --skip-license

  publish-chrome:
    needs: release
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-rc') }}
    steps:
      - uses: actions/checkout@v4
      - name: Check Chrome Web Store credentials
        id: token_check
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        run: |
          if [ -z "$CWS_CLIENT_ID" ] || [ -z "$CWS_CLIENT_SECRET" ] || [ -z "$CWS_REFRESH_TOKEN" ] || [ -z "$CWS_EXTENSION_ID" ]; then
            echo "::warning::Chrome Web Store secrets incomplete — skipping CWS publish."
            echo "::warning::Setup: register at chrome.google.com/webstore/devconsole (\$5),"
            echo "::warning::create OAuth2 creds at console.cloud.google.com (Chrome Web Store API enabled),"
            echo "::warning::add CWS_CLIENT_ID + CWS_CLIENT_SECRET + CWS_REFRESH_TOKEN + CWS_EXTENSION_ID secrets."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - name: Package extension .zip
        if: steps.token_check.outputs.skip != 'true'
        run: |
          # Source the chrome extension from the substrate repo if present;
          # fall back to integrations/chrome-extension if mirrored here later.
          SRC=""
          if [ -d "../ai-mvp-backend/integrations/chrome-extension" ]; then
            SRC="../ai-mvp-backend/integrations/chrome-extension"
          elif [ -d "integrations/chrome-extension" ]; then
            SRC="integrations/chrome-extension"
          else
            echo "::warning::chrome-extension source not found — skipping CWS package."
            exit 0
          fi
          cd "$SRC"
          mkdir -p dist
          zip -r dist/eidetic-chrome.zip . -x "dist/*" "*.DS_Store" "README.md" "TESTING.md" "node_modules/*"
      - name: Upload + publish via CWS API
        if: steps.token_check.outputs.skip != 'true'
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        run: |
          set -euo pipefail
          TOKEN=$(curl -s -X POST -d "client_id=$CWS_CLIENT_ID&client_secret=$CWS_CLIENT_SECRET&refresh_token=$CWS_REFRESH_TOKEN&grant_type=refresh_token" \
            https://www.googleapis.com/oauth2/v4/token | jq -r .access_token)
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::Failed to refresh CWS OAuth token"; exit 1
          fi
          # Upload new package
          ZIP=$(find . -name "eidetic-chrome.zip" -path "*/dist/*" | head -1)
          curl -s -H "Authorization: Bearer $TOKEN" -H "x-goog-api-version: 2" \
            -X PUT -T "$ZIP" \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/$CWS_EXTENSION_ID"
          # Publish
          curl -s -H "Authorization: Bearer $TOKEN" -H "x-goog-api-version: 2" \
            -H "Content-Length: 0" -X POST \
            "https://www.googleapis.com/chromewebstore/v1.1/items/$CWS_EXTENSION_ID/publish"
          echo "Chrome Web Store: publish requested for $CWS_EXTENSION_ID"

  publish-jetbrains:
    needs: release
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-rc') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Check JetBrains token
        id: token_check
        env:
          JETBRAINS_HUB_TOKEN: ${{ secrets.JETBRAINS_HUB_TOKEN }}
        run: |
          if [ -z "$JETBRAINS_HUB_TOKEN" ]; then
            echo "::warning::JETBRAINS_HUB_TOKEN not set — skipping JetBrains Marketplace publish."
            echo "::warning::Setup: account at plugins.jetbrains.com/author/me,"
            echo "::warning::generate hub permanent token (scope: Marketplace), add as JETBRAINS_HUB_TOKEN secret."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - name: Build + publish plugin
        if: steps.token_check.outputs.skip != 'true'
        env:
          ORG_GRADLE_PROJECT_intellijPlatformPublishingToken: ${{ secrets.JETBRAINS_HUB_TOKEN }}
        run: |
          cd integrations/jetbrains
          # Generate gradle wrapper if missing (first-run on a fresh checkout)
          if [ ! -f "./gradlew" ]; then
            gradle wrapper --gradle-version=8.10
          fi
          ./gradlew buildPlugin publishPlugin

  publish-raycast:
    needs: release
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-rc') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check Raycast token
        id: token_check
        env:
          RAYCAST_API_TOKEN: ${{ secrets.RAYCAST_API_TOKEN }}
        run: |
          if [ -z "$RAYCAST_API_TOKEN" ]; then
            echo "::warning::RAYCAST_API_TOKEN not set — skipping Raycast Store publish."
            echo "::warning::Setup: raycast.com account (free), generate API key at raycast.com/account,"
            echo "::warning::add as RAYCAST_API_TOKEN secret. Note: Raycast publish opens a PR against"
            echo "::warning::raycast/extensions; their team merges (1-7 days)."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - name: Publish to Raycast Store
        if: steps.token_check.outputs.skip != 'true'
        env:
          RAYCAST_API_TOKEN: ${{ secrets.RAYCAST_API_TOKEN }}
        run: |
          cd integrations/raycast
          npm ci
          # Raycast CLI reads RAYCAST_API_TOKEN from env automatically.
          npx @raycast/api@latest publish --non-interactive

  publish-obsidian-assets:
    needs: release
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-rc') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build Obsidian plugin
        if: hashFiles('integrations/obsidian/package.json') != ''
        run: |
          cd integrations/obsidian
          if [ -f package.json ]; then
            npm ci
            npm run build || echo "::warning::obsidian build script missing — skipping"
          fi
      - name: Attach Obsidian assets to GitHub Release
        if: hashFiles('integrations/obsidian/main.js') != ''
        uses: softprops/action-gh-release@v2
        with:
          files: |
            integrations/obsidian/main.js
            integrations/obsidian/manifest.json
            integrations/obsidian/styles.css
          fail_on_unmatched_files: false

