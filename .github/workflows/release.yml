name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build all targets
        run: make build-all

      - name: Tarball each target
        run: |
          mkdir -p release
          for target in darwin-arm64 linux-amd64 linux-arm64; do
            cp dist/eideticd-${target} release/eideticd
            ( cd release && tar -czf eideticd-${target}.tar.gz eideticd && rm eideticd )
          done
          # Windows ships as a zipped exe rather than tarball.
          ( cd dist && zip -j ../release/eideticd-windows-amd64.zip eideticd-windows-amd64.exe )
          ls -la release/

      - name: Smoke-test release artifacts
        run: |
          # Extract + -version each tarball to catch silent build failures
          # and the tarball-shape regression that broke install.sh in v0.0.27.
          for target in darwin-arm64 linux-amd64 linux-arm64; do
            tmp=$(mktemp -d)
            tar -xzf release/eideticd-${target}.tar.gz -C "$tmp"
            if [ "$target" = "darwin-arm64" ]; then
              echo "PASS [${target}]: $(\"$tmp/eideticd\" -version)"
            else
              echo "PASS [${target}]: skipping -version (cross-arch); file check below"
              file "$tmp/eideticd"
            fi
            rm -rf "$tmp"
          done

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/eideticd-darwin-arm64.tar.gz
            release/eideticd-linux-amd64.tar.gz
            release/eideticd-linux-arm64.tar.gz
            release/eideticd-windows-amd64.zip
          generate_release_notes: true
