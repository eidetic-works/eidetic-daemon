name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Tidy
        run: go mod tidy && git diff --exit-code go.mod go.sum
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...
      - name: Cross-compile all targets
        run: make build-all
      - name: Bench (P95 SLO gates)
        run: go test -bench=. -benchtime=1x -run=^$ -timeout=180s ./bench/...
      - name: Demo smoke (spec section 8 acceptance #3)
        run: make demo-smoke
